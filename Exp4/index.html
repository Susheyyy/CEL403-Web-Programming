<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Country and Capital Selector</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 30px;
			background-color: #f6f8fb;
		}

		.container {
			max-width: 700px;
			background: #ffffff;
			padding: 24px;
			border-radius: 12px;
			box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
		}

		h1 {
			margin-top: 0;
			color: #1f3a5f;
		}

		.row {
			display: flex;
			align-items: center;
			gap: 14px;
			flex-wrap: wrap;
		}

		select {
			padding: 8px 10px;
			border: 1px solid #cfd7e3;
			border-radius: 6px;
			font-size: 16px;
		}

		#capitalText {
			color: #0b63c9;
			font-weight: bold;
			font-size: 24px;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Country and Capital</h1>
		<div class="row">
			<label for="countrySelect">Select Country:</label>
			<select id="countrySelect">
				<option value="">-- Choose --</option>
				<option value="India">India</option>
				<option value="Japan">Japan</option>
				<option value="France">France</option>
				<option value="Brazil">Brazil</option>
				<option value="Australia">Australia</option>
			</select>
			<span id="capitalText">Capital: -</span>
		</div>
	</div>

	<script>
		const countrySelect = document.getElementById("countrySelect");
		const capitalText = document.getElementById("capitalText");

		const capitals = {
			India: "New Delhi",
			Japan: "Tokyo",
			France: "Paris",
			Brazil: "Brasilia",
			Australia: "Canberra"
		};

		countrySelect.addEventListener("change", function () {
			const selectedCountry = countrySelect.value;
			const capital = capitals[selectedCountry] || "-";
			capitalText.textContent = "Capital: " + capital;
		});
	</script>
</body>
</html>
