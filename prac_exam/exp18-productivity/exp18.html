<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity App</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { color: #333; font-size: 1.2rem; margin-bottom: 10px; }
        .display { font-size: 1.1rem; color: #555; margin-bottom: 20px; padding: 10px; background: #eee; border-radius: 5px; }
        input { width: 80%; padding: 8px; margin-bottom: 10px; }
        button { cursor: pointer; padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Current Date & Time</h2>
    <div id="clock" class="display">Loading...</div>

    <hr>

    <h2>Quick Calculation</h2>
    <input type="number" id="numInput" placeholder="Enter a number">
    <button onclick="calculateSquareRoot()">Get Square Root</button>
    <button onclick="generateRandom()">Random (1-100)</button>
    
    <p id="mathResult" style="font-weight: bold; margin-top: 15px;"></p>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleString();
    }

    setInterval(updateTime, 1000);
    updateTime();

    function calculateSquareRoot() {
        const val = document.getElementById('numInput').value;
        if (val) {
            const result = Math.sqrt(val);
            document.getElementById('mathResult').innerText = `Square Root: ${result.toFixed(2)}`;
        } else {
            alert("Please enter a number first!");
        }
    }

    function generateRandom() {
        const randomNum = Math.floor(Math.random() * 100) + 1;
        document.getElementById('mathResult').innerText = `Random Number: ${randomNum}`;
    }
</script>

</body>
</html>
