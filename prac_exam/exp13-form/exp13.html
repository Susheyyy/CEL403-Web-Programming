<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #333333;
            --card: #f9f9f9;
            --border: #dddddd;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --text: #ffffff;
            --card: #2d2d2d;
            --border: #444444;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 300px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 90%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
        
        button { 
            cursor: pointer; 
            padding: 10px 15px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            width: 100%;
        }

        .toggle-btn {
            background: #6c757d;
            margin-bottom: 20px;
            width: auto;
        }

        .error { color: #ff4d4d; font-size: 0.8rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <button class="toggle-btn" onclick="toggleTheme()">Toggle Dark/Light Mode</button>

    <div class="container">
        <h3>Contact Us</h3>
        <form id="userForm">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="name" placeholder="Enter your name">
                <div id="nameError" class="error">Name is required (min 3 chars).</div>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="Enter your email">
                <div id="emailError" class="error">Enter a valid email address.</div>
            </div>

            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
        }

        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            let isValid = true;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            if (name.length < 3) {
                document.getElementById('nameError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('nameError').style.display = 'none';
            }

            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!email.match(emailPattern)) {
                document.getElementById('emailError').style.display = 'block';
                isValid = false;
            } else {
                document.getElementById('emailError').style.display = 'none';
            }

            if (isValid) {
                alert("Form submitted successfully!");
                this.reset();
            }
        });
    </script>

</body>
</html>
