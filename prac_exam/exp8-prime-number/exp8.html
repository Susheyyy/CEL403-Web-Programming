<!DOCTYPE html>
<html>
<head>
    <title>Prime Number</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; padding-top: 50px; }
        
        .card { 
            background: white; 
            padding: 20px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            width: 280px;
            text-align: center;
        }

        input { 
            width: 80%; 
            padding: 10px; 
            margin: 15px 0; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }

        button { 
            padding: 10px 20px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }

        button:hover { background-color: #218838; }

        #result { 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 1.1rem;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="card">
    <p>Enter a number to check if it's prime:</p>
    
    <input type="number" id="numInput" placeholder="e.g. 7">
    <br>
    <button id="checkBtn">Check Prime</button>

    <div id="result"></div>
</div>

<script>
    document.getElementById('checkBtn').onclick = function() {
        const num = parseInt(document.getElementById('numInput').value);
        const resultDisplay = document.getElementById('result');
        
        if (isNaN(num)) {
            resultDisplay.innerText = "Please enter a valid number.";
            resultDisplay.style.color = "orange";
            return;
        }

        if (isPrime(num)) {
            resultDisplay.innerText = num + " is a Prime Number!";
            resultDisplay.style.color = "green";
        } else {
            resultDisplay.innerText = num + " is not a Prime Number.";
            resultDisplay.style.color = "red";
        }
    };

    function isPrime(n) {
        if (n <= 1) return false;
        for (let i = 2; i <= Math.sqrt(n); i++) {
            if (n % i === 0) return false;
        }
        return true;
    }
</script>

</body>
</html>
