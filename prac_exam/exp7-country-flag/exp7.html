<!DOCTYPE html>
<html>
<head>
    <title>Country Flag</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f5f5f5; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px; 
        }

        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            width: 300px; 
            text-align: center; 
        }

        select { 
            width: 100%; 
            padding: 8px; 
            margin: 15px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .info { 
            margin-top: 10px; 
            padding: 15px;
            background: #fafafa;
            border-radius: 4px;
        }

        #flag { 
            width: 120px; 
            border: 1px solid #eee; 
            margin-bottom: 10px; 
            display: none; 
        }

        #capital { 
            font-weight: bold; 
            font-size: 1.1rem;
            color: #222;
        }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin:0">Flag</h3>
    
    <select id="countrySelect" onchange="updateContent()">
        <option value="">-- Select a Country --</option>
        <option value="in">India</option>
        <option value="us">United States</option>
        <option value="gb">United Kingdom</option>
        <option value="kr">South Korea</option>
        <option value="jp">Japan</option>
    </select>

    <div class="info">
        <img id="flag" src="" alt="Flag">
        <div id="capital">Select to see details</div>
    </div>
</div>

<script>
    function updateContent() {
        const data = {
            "in": "New Delhi",
            "us": "Washington, D.C.",
            "gb": "London",
            "kr": "Seoul",
            "jp": "Tokyo"
        };

        const code = document.getElementById("countrySelect").value;
        const flagImg = document.getElementById("flag");
        const capitalTxt = document.getElementById("capital");

        if (code) {
            capitalTxt.innerText = "Capital: " + data[code];
            
            flagImg.src = `https://flagcdn.com/w160/${code}.png`;
            flagImg.style.display = "inline-block";
        } else {
            capitalTxt.innerText = "Select to see details";
            flagImg.style.display = "none";
        }
    }
</script>

</body>
</html>
