<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function loadData() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "data.txt", true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    document.getElementById("result").innerText = xhr.responseText;
                } else {
                    console.error("Error loading data: " + xhr.status);
                }
            };
            xhr.send();
        }
    </script>
    <button style="color: aqua; background-color: black;" onclick="loadData()">Load Data</button>
    <div id="result"></div>
</body>
</html>
