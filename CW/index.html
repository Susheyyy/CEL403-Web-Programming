<!DOCTYPE html>
<html lang="en">
<head>
    <script type="text/javascript">
        window.onload = function() {
        if(document.addEventListener)
        {
            document.getElementById("button").addEventListener("click", clickHandler, false);
        }else{
            document.getElementById("button").attachEvent("onclick", clickHandler);
        }
        }
        function clickHandler() {
            alert("Jhinkkachika");
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <input type="button" id="button" value="Click Me!" />
</body>
</html>
